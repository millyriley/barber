    /* ── AR FACE MESH (MediaPipe Direct) ────────────────────── */
    const loadFaceMeshScript = () => new Promise((resolve, reject) => {

    /* ── LOAD THREE.JS FROM CDN ────────────────────────────────── */
    var loadThreeJS = function() {
      return new Promise(function(resolve, reject) {
        if (window.THREE) { resolve(); return; }
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js';

        document.head.appendChild(s);

    };

    const HAIR_COLORS = {

    /* ── SMOOTH LANDMARKS ──────────────────────────────────────── */
    function smoothLandmarks(newLandmarks, prevSmoothed, alpha) {
      if (!alpha) alpha = 0.35;
      if (!prevSmoothed || prevSmoothed.length === 0) return newLandmarks;
      return newLandmarks.map(function(lm, i) {
        return {
          x: prevSmoothed[i].x * (1 - alpha) + lm.x * alpha,
          y: prevSmoothed[i].y * (1 - alpha) + lm.y * alpha,
          z: (prevSmoothed[i].z || 0) * (1 - alpha) + (lm.z || 0) * alpha
        };
      });
    }

    /* ── CREATE 3D HAIR GEOMETRY (Three.js) ────────────────────── */
    var createHairGeometry = function(styleId, colorName) {
      var THREE = window.THREE;
      if (!THREE) return null;

      var s = HAIR_SHAPES[styleId];
      if (!s) s = HAIR_SHAPES['low-fade'];

      var palette = HAIR_COLORS[colorName] || HAIR_COLORS.brown;

      // Convert palette to 0-1 range for Three.js
      var midColor = new THREE.Color(palette.mid[0] / 255, palette.mid[1] / 255, palette.mid[2] / 255);

      var group = new THREE.Group();

      // Strand count based on style
      var strandCount = 60 + Math.floor(s.topVol * 40);

      var topH = 1.0 * s.topVol;
      var sideW = 0.5 * (1 + s.sideExt * 6);

      // Create hair strands
      for (var i = 0; i < strandCount; i++) {
        var t = (i / strandCount) * 2 - 1; // -1 to 1 across width

        // Determine strand properties based on style
        var startX, startY, startZ, endX, endY, endZ, radius;

        if (styleId === 'buzz' || styleId === 'low-fade' || styleId === 'mid-fade' || styleId === 'high-fade') {
          // Short, upward strands for fades
          startX = t * sideW * 0.8;
          startY = 0;
          startZ = (Math.random() - 0.5) * 0.1;
          endX = t * sideW * 0.7 + (Math.random() - 0.5) * 0.05;
          endY = -topH * 0.6;
          endZ = startZ + (Math.random() - 0.5) * 0.1;
          radius = 0.012 - Math.abs(t) * 0.004;
        } else if (styleId === 'pompadour' || styleId === 'quiff') {
          // Long, swept-back strands with volume
          startX = t * sideW * 0.8;
          startY = 0;
          startZ = (Math.random() - 0.5) * 0.15;
          var dirMult = Math.abs(t) < 0.3 ? 1.2 : 0.8;
          endX = t * sideW * 0.3;
          endY = -topH * (0.9 + dirMult * 0.3);
          endZ = startZ - Math.abs(t) * 0.3 + (Math.random() - 0.5) * 0.1;
          radius = 0.014 - Math.abs(t) * 0.003;
        } else if (styleId === 'slick-back') {
          // Smooth, straight-back strands
          startX = t * sideW * 0.85;
          startY = 0;
          startZ = (Math.random() - 0.5) * 0.08;
          endX = t * sideW * 0.2;
          endY = -topH * 0.5;
          endZ = startZ - Math.abs(t) * 0.2;
          radius = 0.013;
        } else if (styleId === 'undercut' || styleId === 'two-block') {
          // Only on top, disconnected from sides
          if (Math.abs(t) > 0.1) continue; // Skip sides
          startX = t * sideW * 1.2;
          startY = 0;
          startZ = (Math.random() - 0.5) * 0.1;
          endX = t * sideW * 0.8 + (Math.random() - 0.5) * 0.08;
          endY = -topH * 0.85;
          endZ = startZ + (Math.random() - 0.5) * 0.12;
          radius = 0.013;
        } else if (styleId === 'curly-top') {
          // Spiral/coiled strands
          startX = t * sideW * 0.8;
          startY = 0;
          startZ = (Math.random() - 0.5) * 0.15;
          endX = t * sideW * 0.7 + (Math.random() - 0.5) * 0.1;
          endY = -topH * 0.7;
          endZ = startZ + (Math.random() - 0.5) * 0.15;
          radius = 0.011;
        } else if (styleId === 'textured-crop' || styleId === 'french-crop' || styleId === 'edgar' || styleId === 'line-up') {
          // Choppy/blunt forward-pointing strands
          startX = t * sideW * 0.85;
          startY = 0;
          startZ = (Math.random() - 0.5) * 0.12;
          endX = t * sideW * 0.8 + (Math.random() - 0.5) * 0.06;
          endY = -topH * (0.5 + Math.random() * 0.15);
          endZ = startZ + 0.15 + (Math.random() - 0.5) * 0.08; // Forward
          radius = 0.011;
        } else if (styleId === 'side-part') {
          // Parted style - asymmetric
          var partOffset = sideW * s.partX;
          if (t < 0) {
            // Left side (shorter)
            startX = t * sideW * 0.9;
            startY = 0;
            startZ = (Math.random() - 0.5) * 0.1;
            endX = t * sideW * 0.6;
            endY = -topH * 0.4;
            endZ = startZ - Math.abs(t) * 0.15;
          } else {
            // Right side (longer, swept)
            startX = t * sideW * 0.9;
            startY = 0;
            startZ = (Math.random() - 0.5) * 0.1;
            endX = t * sideW * 0.3;
            endY = -topH * 0.6;
            endZ = startZ - t * 0.2;
          }
          radius = 0.012;
        } else if (styleId === 'taper') {
          // Gradual taper from top to sides
          var sidePos = Math.abs(t);
          startX = t * sideW * 0.85;
          startY = 0;
          startZ = (Math.random() - 0.5) * 0.08;
          endX = t * sideW * 0.7;
          endY = -topH * (0.3 + sidePos * 0.4);
          endZ = startZ + (Math.random() - 0.5) * 0.08;
          radius = 0.012 - sidePos * 0.004;
        } else {
          // Default style
          startX = t * sideW * 0.8;
          startY = 0;
          startZ = (Math.random() - 0.5) * 0.1;
          endX = t * sideW * 0.6;
          endY = -topH * 0.6;
          endZ = startZ + (Math.random() - 0.5) * 0.1;
          radius = 0.012;
        }

        // Create curve for this strand
        var curve = new THREE.CatmullRomCurve3([
          new THREE.Vector3(startX, startY, startZ),
          new THREE.Vector3((startX + endX) * 0.3, (startY + endY) * 0.3, (startZ + endZ) * 0.3),
          new THREE.Vector3((startX + endX) * 0.7, (startY + endY) * 0.7, (startZ + endZ) * 0.7),
          new THREE.Vector3(endX, endY, endZ)
        ]);

        // Create tube geometry along curve
        var tubeGeometry = new THREE.TubeGeometry(curve, 6, radius, 4, false);

        // Vary color slightly per strand
        var colorVar = 0.9 + Math.random() * 0.15;
        var strandColor = new THREE.Color(
          Math.min(1, midColor.r * colorVar),
          Math.min(1, midColor.g * colorVar),
          Math.min(1, midColor.b * colorVar)
        );

        var material = new THREE.MeshStandardMaterial({
          color: strandColor,
          roughness: 0.5 + Math.random() * 0.2,
          metalness: 0.0
        });

        var mesh = new THREE.Mesh(tubeGeometry, material);
        group.add(mesh);
      }

      return group;
    };

    /* ── UPDATE HAIR SCENE (Three.js render) ────────────────────── */
    var updateHairScene = function(sceneRef, hairGroupRef, landmarks, cw, ch, styleId, colorName) {
      if (!sceneRef.current || !landmarks || landmarks.length < 468) return;

      var px = function(i) { return { x: landmarks[i].x * cw, y: landmarks[i].y * ch }; };
      var forehead = px(10), lTemple = px(234), rTemple = px(454), chin = px(152);

      var faceW = Math.hypot(rTemple.x - lTemple.x, rTemple.y - lTemple.y);
      var faceH = Math.hypot(chin.x - forehead.x, chin.y - forehead.y);
      if (faceW < 20 || faceH < 20) return;

      var cx = (lTemple.x + rTemple.x) / 2;
      var cy = forehead.y;
      var angle = Math.atan2(rTemple.y - lTemple.y, rTemple.x - lTemple.x);
      var scale = faceW / 100;

      // Update existing hair group or create new one
      var oldGroup = hairGroupRef.current;
      var newGroup = createHairGeometry(styleId, colorName);

      if (newGroup) {
        if (oldGroup) sceneRef.current.remove(oldGroup);

        // Position in 3D space to match canvas coordinates
        newGroup.position.set(cx, -cy, 0);
        newGroup.rotation.z = angle;
        newGroup.scale.set(scale, scale, scale);

        sceneRef.current.add(newGroup);
        hairGroupRef.current = newGroup;
      }
    };

    /* ── STORAGE ───────────────────────────────────────────────── */
    const load = (k, fb) => { try { const v = localStorage.getItem('b_' + k); return v ? JSON.parse(v) : fb; } catch(e) { return fb; } };

      const hairColorRef = useRef('brown');
      const lastFaceRef = useRef(null);
      const smoothedLandmarksRef = useRef(null);
      const sendingRef = useRef(false);

      // Three.js refs
      const rendererRef = useRef(null);
      const sceneRef = useRef(null);
      const cameraRef = useRef(null);
      const hairGroupRef = useRef(null);

      useEffect(() => { idxRef.current = idx; }, [idx]);
      useEffect(() => { hairColorRef.current = hairColor; }, [hairColor]);

      useEffect(() => {
        if (tryStartId) {
          const i = CUTS.findIndex(h => h.id === tryStartId);
          if (i >= 0) setIdx(i);
          setTryStartId(null);
        }
      }, [tryStartId, setTryStartId]);

      // Cleanup on unmount
      useEffect(() => {
        return () => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          if (meshRef.current) { try { meshRef.current.close(); } catch(e){} meshRef.current = null; }
          if (streamRef.current) {
            streamRef.current.getTracks().forEach(t => t.stop());
            streamRef.current = null;
          }
          // Cleanup Three.js
          if (hairGroupRef.current) {
            hairGroupRef.current.traverse(function(child) {
              if (child.geometry) child.geometry.dispose();
              if (child.material) child.material.dispose();
            });
          }
          if (sceneRef.current && hairGroupRef.current) {
            sceneRef.current.remove(hairGroupRef.current);
          }
          if (rendererRef.current) {
            rendererRef.current.dispose();
            rendererRef.current = null;
          }
        };
      }, []);

      const cut = CUTS[idx];

      // Initialize MediaPipe FaceMesh
      const initFaceMesh = async () => {
        if (meshRef.current) { setModelStatus('ready'); return; }
        setModelStatus('loading');
        setArError('');
        try {
          console.log('[Fade AR] Loading MediaPipe FaceMesh...');
          await loadFaceMeshScript();

          if (!window.FaceMesh) {
            throw new Error('FaceMesh class not found after script load');
          }

          console.log('[Fade AR] Creating FaceMesh instance...');
          const fm = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
          });

          fm.setOptions({
            maxNumFaces: 1,
            refineLandmarks: false,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
          });

          fm.onResults((results) => {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
              lastFaceRef.current = results.multiFaceLandmarks[0];
            } else {
              lastFaceRef.current = null;
            }
            sendingRef.current = false;
          });

          // Warm up the model with a tiny canvas
          console.log('[Fade AR] Warming up model...');
          const warmup = document.createElement('canvas');
          warmup.width = 10; warmup.height = 10;
          await fm.send({ image: warmup });

          meshRef.current = fm;
          console.log('[Fade AR] FaceMesh ready!');
          setModelStatus('ready');
        } catch (e) {
          console.error('[Fade AR] Init failed:', e);
          setArError(e.message || 'Failed to load face tracking');
          setModelStatus('failed');
        }
      };

      // Initialize Three.js scene
      const initThreeJS = async () => {
        if (rendererRef.current) return;
        try {
          await loadThreeJS();
          if (!window.THREE) throw new Error('Three.js not available');

          const THREE = window.THREE;
          const canvas = canvasRef.current;
          if (!canvas) throw new Error('Canvas not found');

          // Create scene
          const scene = new THREE.Scene();
          scene.background = null;
          sceneRef.current = scene;

          // Create camera (orthographic for 2D-like rendering)
          const w = canvas.width;
          const h = canvas.height;
          const camera = new THREE.PerspectiveCamera(
            60,
            w / h,
            0.1,
            10000
          );
          camera.position.z = 100;
          cameraRef.current = camera;

          // Create renderer
          const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
          renderer.setSize(w, h);
          renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
          rendererRef.current = renderer;

          // Add lights
          const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
          scene.add(ambientLight);

          const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
          directionalLight.position.set(0, -50, 100);
          scene.add(directionalLight);

          console.log('[Fade AR] Three.js scene initialized');
        } catch (e) {
          console.error('[Fade AR] Three.js init failed:', e);
          setArError('Failed to initialize 3D rendering');
        }
      };

      const startCamera = async () => {
        setLoading(true);
        setCameraError('');
        try {
          let stream;
          try {
            stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: { ideal: 'user' }, width: { ideal: 640 }, height: { ideal: 480 } }
            });
          } catch (e) {
            stream = await navigator.mediaDevices.getUserMedia({ video: true });
          }
          streamRef.current = stream;
          setCameraOn(true);
          initFaceMesh();
          initThreeJS();
        } catch (e) {
          setCameraError(
            e.name === 'NotAllowedError' ? 'Camera access denied. Check your browser permissions.' :
            e.name === 'NotFoundError' ? 'No camera found on this device.' :
            e.name === 'NotReadableError' ? 'Camera is in use by another app.' :
            'Could not access camera: ' + e.message
          );
        } finally {
          setLoading(false);
        }
      };

      // Attach stream and start render loop when camera turns on
      useEffect(() => {
        if (cameraOn && videoRef.current && streamRef.current) {
          const video = videoRef.current;
          video.srcObject = streamRef.current;
          video.onloadedmetadata = () => {
            if (canvasRef.current) {
              canvasRef.current.width = video.videoWidth;
              canvasRef.current.height = video.videoHeight;
              if (cameraRef.current) {
                cameraRef.current.aspect = video.videoWidth / video.videoHeight;
                cameraRef.current.updateProjectionMatrix();
              }
              if (rendererRef.current) {
                rendererRef.current.setSize(video.videoWidth, video.videoHeight);
              }
            }
          };
          video.play().then(() => {
            console.log('[Fade AR] Video playing, starting render loop');
            startRenderLoop();
          }).catch((e) => {
            setCameraError('Failed to start video: ' + e.message);
            setCameraOn(false);
          });
        }
      }, [cameraOn]);

      const startRenderLoop = () => {
        let frameNum = 0;
        const loop = () => {
          const video = videoRef.current;
          const canvas = canvasRef.current;
          if (!video || !canvas || !rendererRef.current) { rafRef.current = requestAnimationFrame(loop); return; }

          // Ensure canvas matches video
          if (video.videoWidth > 0 && (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight)) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            if (cameraRef.current) {
              cameraRef.current.aspect = video.videoWidth / video.videoHeight;
              cameraRef.current.updateProjectionMatrix();
            }
            if (rendererRef.current) {
              rendererRef.current.setSize(video.videoWidth, video.videoHeight);
            }
          }

          frameNum++;

          // Send frame to FaceMesh every 3rd frame
          if (meshRef.current && !sendingRef.current && video.readyState >= 2 && frameNum % 3 === 0) {
            sendingRef.current = true;
            meshRef.current.send({ image: video }).catch(() => { sendingRef.current = false; });
          }

          // Update Three.js scene with latest landmarks
          if (lastFaceRef.current && sceneRef.current) {
            smoothedLandmarksRef.current = smoothLandmarks(lastFaceRef.current, smoothedLandmarksRef.current, 0.35);
            updateHairScene(
              sceneRef,
              hairGroupRef,
              smoothedLandmarksRef.current,
              canvas.width,
              canvas.height,
              CUTS[idxRef.current].id,
              hairColorRef.current
            );
          }

          // Render Three.js scene
          if (rendererRef.current && sceneRef.current && cameraRef.current) {
            rendererRef.current.render(sceneRef.current, cameraRef.current);
          }

          rafRef.current = requestAnimationFrame(loop);
        };
        rafRef.current = requestAnimationFrame(loop);
      };

      const stopCamera = () => {
        if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }
        if (videoRef.current) videoRef.current.srcObject = null;
        if (streamRef.current) {
          streamRef.current.getTracks().forEach(t => t.stop());
          streamRef.current = null;
        }
        lastFaceRef.current = null;
        setCameraOn(false);
      };

      const nextCut = () => setIdx(i => (i + 1) % CUTS.length);
      const prevCut = () => setIdx(i => (i - 1 + CUTS.length) % CUTS.length);

      const onTouchStart = (e) => { if (e.touches?.[0]) touchStartX.current = e.touches[0].clientX; };
      const onTouchEnd = (e) => {
        if (touchStartX.current === null || !e.changedTouches?.[0]) return;
        const delta = e.changedTouches[0].clientX - touchStartX.current;
        if (Math.abs(delta) > 60) { delta < 0 ? nextCut() : prevCut(); }
        touchStartX.current = null;
      };

      // Pre-camera screen
      if (!cameraOn) return (
        <div className="min-h-screen flex flex-col items-center justify-center p-8 text-center fade-in pb-24">
          <div className="w-24 h-24 rounded-full bg-brand-50 flex items-center justify-center mb-5 pulse-glow">
            <IC.Camera className="w-10 h-10 text-accent" />
          </div>
          <h2 className="text-2xl font-bold mb-2">AR Try-On</h2>
          <p className="text-brand-400 text-sm mb-6 max-w-xs">See hairstyles on your head in real-time using face tracking. Swipe through styles to find your perfect cut.</p>
          <button onClick={startCamera} disabled={loading} className={`text-white px-8 py-3.5 rounded-xl font-semibold text-sm flex items-center gap-2 transition-transform ${loading ? 'bg-brand-400' : 'bg-brand-900 active:scale-[.98]'}`}>
            {loading ? <><div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin" /> Opening...</> : <><IC.Camera className="w-5 h-5" /> Open Camera</>}
          </button>
          {cameraError && <p className="text-red-400 text-xs mt-4 max-w-xs">{cameraError}</p>}
        </div>
      );

      // AR camera view
      return (
        <div className="fixed inset-0 bg-black z-40 flex flex-col" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
          {/* Video + Canvas overlay (both mirrored) */}
          <video ref={videoRef} autoPlay playsInline muted style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',transform:'scaleX(-1)',zIndex:1}} />
          <canvas ref={canvasRef} style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',transform:'scaleX(-1)',zIndex:2,pointerEvents:'none'}} />

          {/* Gradient overlay */}
          <div className="absolute inset-0 bg-gradient-to-b from-black/30 via-transparent to-black/70 pointer-events-none" style={{zIndex:3}} />

          {/* Status badges */}
          {modelStatus === 'loading' && (
            <div className="absolute top-20 left-0 right-0 flex justify-center" style={{zIndex:15}}>
              <div className="bg-black/60 backdrop-blur-sm px-4 py-2 rounded-full flex items-center gap-2">
                <div className="w-3 h-3 border-2 border-white/30 border-t-accent rounded-full animate-spin" />
                <span className="text-white text-xs font-medium">Loading face tracking...</span>
              </div>
            </div>
          )}

          {modelStatus === 'ready' && (
            <div className="absolute top-20 left-0 right-0 flex justify-center" style={{zIndex:15}}>
              <div className="bg-green-500/20 backdrop-blur-sm px-3 py-1.5 rounded-full flex items-center gap-1.5">
                <div className="w-2 h-2 bg-green-400 rounded-full" />
                <span className="text-green-300 text-[10px] font-medium">AR Active</span>
              </div>
            </div>
          )}

          {modelStatus === 'failed' && (
            <>
              <div className="absolute top-20 left-0 right-0 flex justify-center" style={{zIndex:15}}>
                <div className="bg-red-500/20 backdrop-blur-sm px-3 py-1.5 rounded-full flex items-center gap-1.5 max-w-[80%]">
                  <span className="text-red-300 text-[10px] font-medium truncate">AR unavailable{arError ? ': ' + arError : ''}</span>
                </div>
              </div>
              <div className="absolute top-28 right-3 w-28" style={{zIndex:10}}>
                <div className="rounded-xl overflow-hidden shadow-2xl border-2 border-white/20">
                  <Img src={cut.photos[0]} alt={cut.name} className="aspect-[3/4]" />
                </div>
                <p className="text-white text-[10px] font-semibold text-center mt-1.5 drop-shadow">{cut.name}</p>
                <p className="text-white/40 text-[9px] text-center mt-0.5">Reference</p>
              </div>
            </>
          )}

          {/* Top bar */}
          <div className="relative flex items-center justify-between p-4 pt-12" style={{zIndex:10}}>
            <button onClick={stopCamera} className="w-10 h-10 bg-black/40 backdrop-blur-sm rounded-full flex items-center justify-center">
              <IC.X className="w-5 h-5 text-white" />
            </button>
            <p className="text-white/50 text-[11px] font-medium tracking-wider uppercase">Swipe to change</p>
            <button onClick={() => toggleFav(cut.id)} className={`w-10 h-10 backdrop-blur-sm rounded-full flex items-center justify-center ${favs.includes(cut.id) ? 'bg-red-500/30' : 'bg-black/40'}`}>
              <IC.Heart className={`w-5 h-5 ${favs.includes(cut.id) ? 'text-red-400' : 'text-white'}`} filled={favs.includes(cut.id)} />
            </button>
          </div>

          {/* Tap zones */}
          <div className="flex-1 relative flex" style={{zIndex:10}}>
            <button onClick={prevCut} className="w-1/4 h-full" aria-label="Previous style" />
            <div className="flex-1" />
            <button onClick={nextCut} className="w-1/4 h-full" aria-label="Next style" />
          </div>

          <div className="absolute left-2 top-1/2 -translate-y-1/2 text-white/20 pointer-events-none" style={{zIndex:10}}><IC.Left className="w-7 h-7" /></div>
          <div className="absolute right-2 top-1/2 -translate-y-1/2 text-white/20 pointer-events-none" style={{zIndex:10}}><IC.Right className="w-7 h-7" /></div>

          {/* Bottom info */}
          <div className="relative px-5 pb-8" style={{zIndex:10}}>
            <div className="text-center mb-4">
              <h2 className="text-white text-2xl font-bold drop-shadow-lg">{cut.name}</h2>
              <p className="text-white/60 text-sm mt-1">{cut.desc.split('.')[0]}.</p>
              <div className="flex justify-center gap-2 mt-2 flex-wrap">
                <span className={`text-[11px] px-2.5 py-1 rounded-full font-medium ${cut.diff === 'easy' ? 'bg-green-500/30 text-green-300' : cut.diff === 'medium' ? 'bg-yellow-500/30 text-yellow-300' : 'bg-red-500/30 text-red-300'}`}>{cut.diff}</span>
                <span className="text-[11px] px-2.5 py-1 rounded-full bg-white/15 text-white/70 font-medium">{cut.maint} maint.</span>
                <span className="text-[11px] px-2.5 py-1 rounded-full bg-white/15 text-white/70 font-medium">{cut.time} min</span>
              </div>
            </div>
            <div className="flex justify-center gap-3 mb-4">
              {['black', 'brown', 'blonde', 'red', 'gray'].map(color => (
                <button
                  key={color}
                  onClick={() => setHairColor(color)}
                  className="transition-transform"
                  aria-label={`${color} hair`}
                  style={{
                    width: '28px',
                    height: '28px',
                    borderRadius: '50%',
                    backgroundColor:
                      color === 'black' ? '#1a0f08' :
                      color === 'brown' ? '#6b3e25' :
                      color === 'blonde' ? '#d4a574' :
                      color === 'red' ? '#a83020' :
                      '#6b6b6b',
                    border: hairColor === color ? '2px solid rgba(232,168,56,0.8)' : '2px solid transparent',
                    boxShadow: hairColor === color ? '0 0 0 2px rgba(232,168,56,0.4)' : 'none',
                    cursor: 'pointer'
                  }}
                />
              ))}
            </div>
            <div className="flex justify-center gap-5 mb-3">
              <button onClick={prevCut} className="w-14 h-14 rounded-full bg-white/15 backdrop-blur-sm flex items-center justify-center active:scale-95 transition-transform border border-white/20">
                <IC.Left className="w-6 h-6 text-white/70" />
              </button>
              <button onClick={() => toggleFav(cut.id)} className={`w-16 h-16 rounded-full backdrop-blur-sm flex items-center justify-center active:scale-95 transition-transform border-2 ${favs.includes(cut.id) ? 'bg-red-500/40 border-red-400/50' : 'bg-white/10 border-white/20'}`}>
                <IC.Heart className={`w-7 h-7 ${favs.includes(cut.id) ? 'text-red-400' : 'text-white'}`} filled={favs.includes(cut.id)} />
              </button>
              <button onClick={nextCut} className="w-14 h-14 rounded-full bg-white/15 backdrop-blur-sm flex items-center justify-center active:scale-95 transition-transform border border-white/20">
                <IC.Right className="w-6 h-6 text-white/70" />
              </button>
            </div>
            <div className="flex justify-center gap-1">
              {CUTS.slice(Math.max(0, idx - 4), idx + 5).map(h => (
                <div key={h.id} className={`rounded-full transition-all ${h.id === cut.id ? 'w-6 h-1.5 bg-accent' : 'w-1.5 h-1.5 bg-white/30'}`} />
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ── MY CUTS ──────────────────────────────────────────────── */
    function MyCutsPage() {
      const { sels, setSels, favs, toggleFav, setPage, goTryOn } = useContext(Ctx);
      const [showShare, setShowShare] = useState(false);
      const [copied, setCopied] = useState(false);
      const [notes, setNotes] = useState(sels.notes || '');

      const pc = sels.primary ? CUTS.find(h => h.id === sels.primary) : null;
      const alts = (sels.alts || []).map(id => CUTS.find(h => h.id === id)).filter(Boolean);
      const fc = CUTS.filter(h => favs.includes(h.id));

      const setPri = (id) => setSels(p => ({ ...p, primary: id }));
      const togAlt = (id) => setSels(p => {
        const a = p.alts || [];
        return { ...p, alts: a.includes(id) ? a.filter(x => x !== id) : a.length < 3 ? [...a, id] : a };
      });
      const updNotes = (v) => { setNotes(v); setSels(p => ({ ...p, notes: v })); };

      const doShare = async () => {
        const text = `My haircut selection:\n\nPrimary: ${pc?.name || 'None'}\n${alts.length ? 'Alternates: ' + alts.map(c => c.name).join(', ') + '\n' : ''}${notes ? 'Notes: ' + notes : ''}`;
        try {
          if (navigator.share) {
            await navigator.share({ title: 'Fade — My Selection', text });
          } else {
            await navigator.clipboard.writeText(text);
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
          }
        } catch (e) {
          try {
            await navigator.clipboard.writeText(text);
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
          } catch (e2) {
            alert('Could not share. Try copying manually.');
          }
        }
      };

      if (!pc && fc.length === 0) return (
        <div className="pb-24 pt-4 fade-in">
          <div className="px-5 pt-2 mb-6"><h1 className="text-2xl font-bold">My Cuts</h1></div>
          <div className="flex flex-col items-center py-16 px-5 text-center">
            <div className="w-20 h-20 rounded-full bg-brand-50 flex items-center justify-center mb-4"><IC.Scissors className="w-10 h-10 text-brand-200" /></div>
            <p className="font-semibold text-lg mb-1">No cuts saved yet</p>
            <p className="text-sm text-brand-400 mb-6">Browse styles, try them on, and heart your favorites.</p>
            <button onClick={() => setPage('discover')} className="bg-brand-900 text-white px-6 py-3 rounded-xl font-semibold text-sm">Explore Styles</button>
          </div>
        </div>
      );

      return (
        <div className="pb-24 pt-4 fade-in">
          <div className="px-5 pt-2 mb-5"><h1 className="text-2xl font-bold mb-1">My Cuts</h1><p className="text-sm text-brand-400">Your picks to share with your barber.</p></div>

          <div className="px-5 mb-5">
            <h3 className="font-semibold text-sm mb-2">Primary Choice</h3>
            {pc ? (
              <div className="bg-accent/5 border-2 border-accent/20 rounded-2xl p-3 flex gap-3">
                <Img src={pc.photos[0]} alt={pc.name} className="w-20 h-20 rounded-xl flex-shrink-0" />
                <div className="flex-1">
                  <div className="flex items-center gap-2"><p className="font-semibold">{pc.name}</p><span className="text-[10px] px-2 py-0.5 bg-accent text-white rounded-full font-medium">Primary</span></div>
                  <p className="text-xs text-brand-400 mt-0.5">{pc.diff} · {pc.maint} maint.</p>
                  <button onClick={() => setPri(null)} className="text-xs text-red-400 mt-1">Remove</button>
                </div>
              </div>
            ) : (
              <div className="border-2 border-dashed border-brand-200 rounded-2xl p-6 text-center"><p className="text-sm text-brand-400">Tap a saved cut below to set as primary</p></div>
            )}
          </div>

          {alts.length > 0 && (
            <div className="px-5 mb-5">
              <h3 className="font-semibold text-sm mb-2">Alternates ({alts.length}/3)</h3>
              <div className="flex gap-2.5 overflow-x-auto no-scrollbar">
                {alts.map(c => (
                  <div key={c.id} className="flex-shrink-0 w-24">
                    <div className="relative rounded-xl overflow-hidden aspect-square mb-1">
                      <Img src={c.photos[0]} alt={c.name} className="w-full h-full" />
                      <button onClick={() => togAlt(c.id)} className="absolute top-1 right-1 w-6 h-6 bg-black/40 rounded-full flex items-center justify-center"><IC.X className="w-3 h-3 text-white" /></button>
                    </div>
                    <p className="text-xs font-medium truncate">{c.name}</p>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className="px-5 mb-5">
            <h3 className="font-semibold text-sm mb-2">Notes for your barber</h3>
            <textarea value={notes} onChange={e => updNotes(e.target.value)} placeholder="Anything specific for your barber..." className="w-full bg-brand-50 rounded-xl p-3.5 text-sm outline-none border-2 border-transparent focus:border-brand-200 resize-none h-24" />
          </div>

          {fc.length > 0 && (
            <div className="px-5 mb-5">
              <h3 className="font-semibold text-sm mb-2">Saved Styles</h3>
              <div className="space-y-2.5">
                {fc.map(c => (
                  <div key={c.id} className="flex gap-3 bg-brand-50 rounded-xl p-3 items-center">
                    <Img src={c.photos[0]} alt={c.name} className="w-14 h-14 rounded-lg flex-shrink-0" />
                    <div className="flex-1 min-w-0"><p className="text-sm font-semibold">{c.name}</p><p className="text-xs text-brand-400">{c.diff} · {c.len}</p></div>
                    <div className="flex gap-1.5">
                      <button onClick={() => setPri(c.id)} className={`text-[10px] px-2.5 py-1.5 rounded-lg font-medium ${sels.primary === c.id ? 'bg-accent text-white' : 'bg-brand-100 text-brand-500'}`}>{sels.primary === c.id ? 'Primary' : 'Set'}</button>
                      <button onClick={() => togAlt(c.id)} className={`text-[10px] px-2.5 py-1.5 rounded-lg font-medium ${(sels.alts || []).includes(c.id) ? 'bg-brand-900 text-white' : 'bg-brand-100 text-brand-500'}`}>{(sels.alts || []).includes(c.id) ? 'Alt' : '+Alt'}</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {pc && (
            <div className="px-5 mb-5">
              <button onClick={() => setShowShare(true)} className="w-full bg-brand-900 text-white py-3.5 rounded-xl font-semibold text-sm flex items-center justify-center gap-2 active:scale-[.98] transition-transform">
                <IC.Share className="w-4 h-4" /> Share with Barber
              </button>
            </div>
          )}

          {showShare && (
            <div className="fixed inset-0 bg-black/50 z-50 flex items-end" onClick={() => setShowShare(false)}>
              <div className="bg-white rounded-t-3xl w-full max-w-lg p-6 slide-up" onClick={e => e.stopPropagation()}>
                <div className="w-10 h-1 bg-brand-200 rounded-full mx-auto mb-5" />
                <h3 className="text-lg font-bold mb-4">Share with your barber</h3>
                <div className="bg-brand-50 rounded-2xl p-4 mb-5">
                  <div className="flex gap-3 mb-3">
                    <Img src={pc.photos[0]} alt={pc.name} className="w-16 h-16 rounded-xl flex-shrink-0" />
                    <div>
                      <p className="font-semibold">{pc.name}</p>
                      <p className="text-xs text-brand-400">{pc.diff} · {pc.time} min</p>
                      {alts.length > 0 && <p className="text-xs text-brand-400 mt-0.5">+ {alts.length} alternate{alts.length > 1 ? 's' : ''}</p>}
                    </div>
                  </div>
                  {notes && <p className="text-xs text-brand-500 bg-white rounded-lg p-2.5">&ldquo;{notes}&rdquo;</p>}
                </div>
                <button onClick={doShare} className="w-full flex items-center gap-3 bg-brand-50 p-4 rounded-xl active:bg-brand-100 mb-2">
                  {copied ? <IC.Check className="w-5 h-5 text-green-500" /> : <IC.Share className="w-5 h-5 text-brand-400" />}
                  <div className="text-left"><p className="text-sm font-medium">{copied ? 'Copied!' : 'Share'}</p><p className="text-xs text-brand-400">Send to your barber via any app</p></div>
                </button>
                <button onClick={() => setShowShare(false)} className="w-full mt-2 py-3 text-sm font-medium text-brand-400">Cancel</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ── BOOKING ──────────────────────────────────────────────── */
    function BookingPage() {
      const { sels } = useContext(Ctx);
      const [date, setDate] = useState('');
      const [time, setTime] = useState('10:00');
      const [barber, setBarber] = useState('any');
      const [notes, setNotes] = useState('');

      const barbers = [
        { id: 'any', name: 'Any Barber', avail: 8 },
        { id: 'marcus', name: 'Marcus', avail: 3 },
        { id: 'carlos', name: 'Carlos', avail: 5 },
        { id: 'james', name: 'James', avail: 2 },
      ];

      const times = ['09:00', '09:30', '10:00', '10:30', '11:00', '11:30', '14:00', '14:30', '15:00', '15:30', '16:00', '16:30'];

      return (
        <div className="pb-24 pt-4 fade-in">
          <div className="px-5 pt-2 mb-5"><h1 className="text-2xl font-bold mb-1">Book Your Cut</h1><p className="text-sm text-brand-400">Reserve your appointment</p></div>

          {!sels.primary && (
            <div className="mx-5 mb-5 bg-yellow-50 border-2 border-yellow-200 rounded-2xl p-4">
              <p className="text-sm text-yellow-800 font-medium">Select a cut in My Cuts to book an appointment</p>
            </div>
          )}

          {sels.primary && (
            <div className="px-5 mb-5">
              <div className="bg-brand-50 rounded-2xl p-4 flex gap-3 items-start">
                <div>
                  <p className="text-sm font-semibold text-brand-900">{CUTS.find(h => h.id === sels.primary)?.name}</p>
                  <p className="text-xs text-brand-400 mt-1">Selected for booking</p>
                </div>
              </div>
            </div>
          )}

          <div className="px-5 space-y-5">
            <div>
              <label className="text-sm font-semibold text-brand-900 block mb-2">Date</label>
              <input type="date" value={date} onChange={e => setDate(e.target.value)} className="w-full bg-brand-50 rounded-xl p-3.5 text-sm outline-none border-2 border-transparent focus:border-brand-200" />
            </div>

            <div>
              <label className="text-sm font-semibold text-brand-900 block mb-2">Time</label>
              <select value={time} onChange={e => setTime(e.target.value)} className="w-full bg-brand-50 rounded-xl p-3.5 text-sm outline-none border-2 border-transparent focus:border-brand-200">
                {times.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>

            <div>
              <label className="text-sm font-semibold text-brand-900 block mb-2">Barber</label>
              <select value={barber} onChange={e => setBarber(e.target.value)} className="w-full bg-brand-50 rounded-xl p-3.5 text-sm outline-none border-2 border-transparent focus:border-brand-200">
                {barbers.map(b => <option key={b.id} value={b.id}>{b.name} ({b.avail} available)</option>)}
              </select>
            </div>

            <div>
              <label className="text-sm font-semibold text-brand-900 block mb-2">Special requests</label>
              <textarea value={notes} onChange={e => setNotes(e.target.value)} placeholder="Let us know any preferences..." className="w-full bg-brand-50 rounded-xl p-3.5 text-sm outline-none border-2 border-transparent focus:border-brand-200 resize-none h-20" />
            </div>

            <button disabled={!date || !sels.primary} className={`w-full py-3.5 rounded-xl font-semibold text-sm ${!date || !sels.primary ? 'bg-brand-200 text-brand-400 cursor-not-allowed' : 'bg-brand-900 text-white active:scale-[.98] transition-transform'}`}>
              Confirm Booking
            </button>
          </div>
        </div>
      );
    }

    /* ── MAIN APP ─────────────────────────────────────────────── */
    function App() {
      const { page } = useContext(Ctx);
      const pages = { home: HomePage, discover: DiscoverPage, tryon: TryOnPage, mycuts: MyCutsPage, booking: BookingPage };
      const Page = pages[page] || HomePage;
      return (
        <>
          <div className="max-w-lg mx-auto bg-white min-h-screen relative">
            <Page />
          </div>
          <Nav />
        </>
      );
    }

    // Mount app
    ReactDOM.render(
      <Provider><App /></Provider>,
      document.getElementById('root')
    );
  </script>
</body>
</html>
